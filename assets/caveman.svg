<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 130" width="150" height="130" role="img" aria-label="caveman with club">
  <!-- club (behind, to the left) -->
  <g transform="rotate(-13 33 86)">
    <rect x="27" y="52" width="12" height="68" rx="6" fill="#8a5a2b"/>
    <ellipse cx="33" cy="50" rx="16" ry="14" fill="#a06a34"/>
    <circle cx="27" cy="46" r="2.4" fill="#7a4a20"/>
    <circle cx="39" cy="52" r="2.4" fill="#7a4a20"/>
    <circle cx="35" cy="42" r="2.4" fill="#7a4a20"/>
    <circle cx="28" cy="56" r="2.4" fill="#7a4a20"/>
  </g>
  <!-- hair back -->
  <path d="M49 64 Q42 30 82 26 Q122 30 115 64 Z" fill="#4a3526"/>
  <!-- face -->
  <circle cx="82" cy="62" r="32" fill="#d9a066"/>
  <!-- beard -->
  <path d="M53 64 Q55 104 82 104 Q109 104 111 64 Q104 84 82 86 Q60 84 53 64 Z" fill="#4a3526"/>
  <!-- unibrow -->
  <rect x="63" y="52" width="38" height="8" rx="4" fill="#4a3526"/>
  <!-- eyes -->
  <circle cx="73" cy="65" r="5.4" fill="#fff"/>
  <circle cx="91" cy="65" r="5.4" fill="#fff"/>
  <circle cx="74.5" cy="66" r="2.6" fill="#2b2118"/>
  <circle cx="89.5" cy="66" r="2.6" fill="#2b2118"/>
  <!-- nose -->
  <path d="M82 67 Q77 76 82 77 Q87 76 82 67 Z" fill="#b9843f"/>
  <!-- bone in hair -->
  <g transform="rotate(-15 82 32)">
    <rect x="74" y="30" width="16" height="5" rx="2.5" fill="#f0e6d2"/>
    <circle cx="74" cy="30" r="3" fill="#f0e6d2"/>
    <circle cx="74" cy="35" r="3" fill="#f0e6d2"/>
    <circle cx="90" cy="30" r="3" fill="#f0e6d2"/>
    <circle cx="90" cy="35" r="3" fill="#f0e6d2"/>
  </g>
</svg>
