name: Weekly eval

on:
  schedule:
    # Every Monday 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (anthropic SDK for the live path)
        run: pip install anthropic

      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_eval.py --date "$(date -u +%F)"

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results.jsonl benchmarks/scorecard.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly eval run [skip ci]"
            git push
          fi
