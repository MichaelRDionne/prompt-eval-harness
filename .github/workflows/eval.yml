name: Weekly eval

on:
  schedule:
    # Every Monday 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (anthropic SDK for the live path)
        run: pip install anthropic

      - name: Require ANTHROPIC_API_KEY (fail loud, never downgrade to mock)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set. The scheduled eval is a LIVE"
            echo "::error::measurement and must not silently fall back to the mock —"
            echo "::error::a mock row logged as a real run is what polluted the history."
            exit 1
          fi

      - name: Run eval suite (live)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_eval.py --date "$(date -u +%F)"

      - name: Render dashboard
        run: |
          python scripts/render_dashboard.py

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results.jsonl benchmarks/scorecard.svg docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly eval run [skip ci]"
            git push
          fi
